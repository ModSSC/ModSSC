run:
  name: best_vision_transductive_chebnet_svhn_R2
  seed: 3
  seeds:
  - 3
  - 4
  - 5
  - 6
  - 7
  output_dir: ${MODSSC_OUTPUT_DIR}/R2/transductive/chebnet/vision/svhn
  log_level: detailed
  fail_fast: true
limits:
  profile: auto
dataset:
  id: svhn
  download: true
  cache_dir: ${MODSSC_DATASET_CACHE_DIR}
sampling:
  seed: 3
  plan:
    split:
      kind: holdout
      test_fraction: 0.2
      val_fraction: 0.1
      stratify: true
      shuffle: true
    labeling:
      mode: per_class
      value: 3
      strategy: balanced
      min_per_class: 1
      per_class: true
      fixed_indices: null
    imbalance:
      kind: none
    policy:
      respect_official_test: true
      use_official_graph_masks: true
      allow_override_official: false
preprocess:
  seed: 3
  fit_on: train_labeled
  cache: true
  cache_dir: ${MODSSC_PREPROCESS_CACHE_DIR}
  plan:
    output_key: features.X
    steps:
    - id: labels.encode
    - id: vision.ensure_num_channels
      params:
        num_channels: 3
    - id: vision.channels_order
      params:
        order: NCHW
    - id: vision.resize
      params:
        height: 32
        width: 32
    - id: vision.normalize
      params:
        mean:
        - 123.675
        - 116.28
        - 103.53
        std:
        - 58.395
        - 57.12
        - 57.375
    - id: embeddings.auto
      params:
        model_id_vision: torchvision:resnet18
        batch_size: 64
    - id: core.to_numpy
method:
  kind: transductive
  id: chebnet
  device:
    device: auto
    dtype: float32
  params:
    hidden_dim: 32
    k: 2
    dropout: 0.5
    lr: 0.01
    weight_decay: 0.0005
    max_epochs: 200
    patience: 50
    add_self_loops: true
evaluation:
  split_for_model_selection: val
  report_splits:
  - val
  - test
  metrics:
  - accuracy
  - macro_f1
graph:
  enabled: true
  seed: 3
  cache: true
  cache_dir: ${MODSSC_GRAPH_CACHE_DIR}
  spec:
    scheme: knn
    metric: cosine
    k: 15
    symmetrize: mutual
    weights:
      kind: heat
      sigma: 1.0
    normalize: rw
    self_loops: true
    backend: numpy
    chunk_size: 1024
    feature_field: features.X
