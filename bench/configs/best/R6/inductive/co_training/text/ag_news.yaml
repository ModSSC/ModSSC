run:
  name: best_text_inductive_co_training_ag_news_R6
  seed: 2
  seeds:
  - 2
  - 3
  - 4
  - 5
  - 6
  output_dir: ${MODSSC_OUTPUT_DIR}/R6/inductive/co_training/text/ag_news
  log_level: detailed
  fail_fast: true
limits:
  profile: auto
dataset:
  id: ag_news
  download: true
  cache_dir: ${MODSSC_DATASET_CACHE_DIR}
  options:
    text_column: text
    label_column: label
    prefer_test_split: true
sampling:
  seed: 2
  plan:
    split:
      kind: holdout
      test_fraction: 0.2
      val_fraction: 0.1
      stratify: true
      shuffle: true
    labeling:
      mode: per_class
      value: 50
      strategy: balanced
      min_per_class: 1
      per_class: true
      fixed_indices: null
    imbalance:
      kind: none
    policy:
      respect_official_test: true
      use_official_graph_masks: true
      allow_override_official: false
preprocess:
  seed: 2
  fit_on: train_labeled
  cache: true
  cache_dir: ${MODSSC_PREPROCESS_CACHE_DIR}
  plan:
    output_key: features.X
    steps:
    - id: labels.encode
    - id: text.ensure_strings
    - id: text.sentence_transformer
      params:
        model_id: st:all-MiniLM-L6-v2
        batch_size: 32
    - id: core.pca
      params:
        n_components: 128
    - id: core.to_numpy
method:
  kind: inductive
  id: co_training
  device:
    device: auto
    dtype: float32
  params:
    classifier_id: logreg
    classifier_backend: sklearn
    classifier_params:
      max_iter: 1000
    max_iter: 20
    k_per_class: 1
evaluation:
  split_for_model_selection: val
  report_splits:
  - val
  - test
  metrics:
  - accuracy
  - macro_f1
views:
  seed: 2
  plan:
    views:
    - name: view_a
      columns:
        mode: random
        fraction: 0.5
    - name: view_b
      columns:
        mode: complement
        complement_of: view_a
