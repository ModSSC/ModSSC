---
run:
  name: best_vision_inductive_co_training_mnist_p02
  seed: 3
  output_dir: "${MODSSC_OUTPUT_DIR}/p02/inductive/co_training/vision/mnist"
  log_level: detailed
  fail_fast: true
limits:
  profile: auto
dataset:
  id: mnist
  download: true
  cache_dir: "${MODSSC_DATASET_CACHE_DIR}"
sampling:
  seed: 3
  plan:
    split:
      kind: holdout
      test_fraction: 0.2
      val_fraction: 0.1
      stratify: true
      shuffle: true
    labeling:
      mode: fraction
      value: 0.02
      strategy: balanced
      min_per_class: 1
    imbalance:
      kind: none
    policy:
      respect_official_test: true
      use_official_graph_masks: true
      allow_override_official: false
preprocess:
  seed: 3
  fit_on: train_labeled
  cache: true
  cache_dir: "${MODSSC_PREPROCESS_CACHE_DIR}"
  plan:
    output_key: features.X
    steps:
    - id: labels.encode
    - id: vision.ensure_num_channels
      params:
        num_channels: 3
    - id: vision.channels_order
      params:
        order: NCHW
    - id: vision.resize
      params:
        height: 28
        width: 28
    - id: vision.normalize
      params:
        mean:
        - 123.675
        - 116.28
        - 103.53
        std:
        - 58.395
        - 57.12
        - 57.375
    - id: embeddings.auto
      params:
        model_id_vision: torchvision:resnet18
        batch_size: 64
    - id: core.to_numpy
method:
  kind: inductive
  id: co_training
  device:
    device: auto
    dtype: float32
  params:
    classifier_id: logreg
    classifier_backend: sklearn
    classifier_params:
      max_iter: 1000
    max_iter: 20
    k_per_class: 1
evaluation:
  split_for_model_selection: val
  report_splits:
  - val
  - test
  metrics:
  - accuracy
  - macro_f1
views:
  seed: 3
  plan:
    views:
    - name: view_a
      columns:
        mode: random
        fraction: 0.5
    - name: view_b
      columns:
        mode: complement
        complement_of: view_a
