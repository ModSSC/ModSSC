run:
  name: best_audio_inductive_co_training_speechcommands_R1
  seed: 4
  seeds:
  - 4
  - 5
  - 6
  - 7
  - 8
  output_dir: ${MODSSC_OUTPUT_DIR}/R1/inductive/co_training/audio/speechcommands
  fail_fast: true
  log_level: detailed
limits:
  profile: auto
dataset:
  id: speechcommands
  download: true
  cache_dir: ${MODSSC_DATASET_CACHE_DIR}
sampling:
  seed: 4
  plan:
    split:
      kind: holdout
      test_fraction: 0.2
      val_fraction: 0.1
      stratify: true
      shuffle: true
    labeling:
      mode: per_class
      value: 1
      strategy: balanced
      min_per_class: 1
      per_class: true
      fixed_indices: null
    imbalance:
      kind: none
    policy:
      respect_official_test: true
      use_official_graph_masks: true
      allow_override_official: false
preprocess:
  seed: 4
  fit_on: train_labeled
  cache: true
  cache_dir: ${MODSSC_PREPROCESS_CACHE_DIR}
  plan:
    output_key: features.X
    steps:
    - id: labels.encode
    - id: audio.wav2vec2
      params:
        model_id: wav2vec2:base
        batch_size: 8
    - id: core.pca
      params:
        n_components: 128
    - id: core.to_numpy
method:
  kind: inductive
  id: co_training
  device:
    device: auto
    dtype: float32
  params:
    classifier_id: logreg
    classifier_backend: sklearn
    classifier_params:
      max_iter: 1000
    max_iter: 20
    k_per_class: 1
evaluation:
  split_for_model_selection: val
  report_splits:
  - val
  - test
  metrics:
  - accuracy
  - macro_f1
views:
  seed: 4
  plan:
    views:
    - name: view_a
      columns:
        mode: random
        fraction: 0.5
    - name: view_b
      columns:
        mode: complement
        complement_of: view_a
